# Local development services
# Run: docker compose up -d
version: "3.9"
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: crewclock
      POSTGRES_PASSWORD: crewclock
      POSTGRES_DB: crewclock
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # After starting: docker exec -it crewclock-ollama-1 ollama pull llama3.2:3b
    # docker exec -it crewclock-ollama-1 ollama pull nomic-embed-text

volumes:
  postgres_data:
  redis_data:
  ollama_data:
